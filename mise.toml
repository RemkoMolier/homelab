[env]
_.file = { path = ".env.sops.json", tools = true, optional = true }

[settings]
sops.rops = false

[tools]
node = "24"
"npm:markdownlint-cli2" = "0.22"
"npm:markdownlint-sentences-per-line" = "0.1"
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"
opentofu = "1.11"
"pipx:ansible-core" = "2.20"
sops = "3.12"
lefthook = "2.1"
tflint = "0.61"
trivy = "0.69"
age = "1.3"
gitleaks = "8.30"

[hooks.enter]
shell = "bash"
script = "lefthook install"

[tasks.lint]
description = "Run all linters"
depends = ["lint:markdown", "lint:terraform"]

[tasks."lint:markdown"]
description = "Lint markdown files"
run = "markdownlint-cli2 '**/*.md'"

[tasks."lint:terraform"]
description = "Lint and validate Terraform config"
dir = "terraform/routeros"
depends = ["lint:terraform:fmt", "lint:terraform:validate", "lint:terraform:tflint", "lint:terraform:trivy"]

[tasks."lint:terraform:terraform:init"]
description = "Initialize OpenTofu providers"
dir = "terraform/routeros"
run = """
tofu init
"""

[tasks."lint:terraform:fmt"]
description = "Check Terraform formatting"
dir = "terraform/routeros"
run = "tofu fmt -check -recursive"

[tasks."lint:terraform:validate"]
description = "Validate Terraform configuration"
dir = "terraform/routeros"
depends = ["lint:terraform:terraform:init"]
run = "tofu validate"

[tasks."lint:terraform:tflint:init"]
description = "Initialize OpenTofu providers"
dir = "terraform/routeros"
run = """
tflint --init
"""

[tasks."lint:terraform:tflint"]
description = "Run TFLint"
dir = "terraform/routeros"
depends = ["lint:terraform:tflint:init"]
run = "tflint --recursive"

[tasks."lint:terraform:trivy"]
description = "Run Trivy security scan on Terraform"
dir = "terraform/routeros"
run = "trivy config --severity HIGH,CRITICAL --exit-code 1 ."
