# https://github.com/DavidAnson/markdownlint-cli2
# Config auto-detected by VS Code extension: DavidAnson.vscode-markdownlint

config:
  # Disable line-length rule — semantic line breaks mean sentences often exceed 80 chars
  MD013: false

  # Allow duplicate headings under different parents (MADR templates repeat option headings)
  MD024:
    siblings_only: true

  # Do not treat YAML frontmatter 'title' as an implicit h1
  MD025:
    front_matter_title: ""

  # Allow HTML comments (used in MADR templates for instructions)
  MD033:
    allowed_elements:
      - "!--"

  # Enforce compact table style (single space around content, no alignment padding)
  MD060:
    style: compact

  customRules:
    - markdownlint-sentences-per-line

# Respect .gitignore
gitignore: true
