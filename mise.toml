[env]
_.file = { path = ".env.sops.json", tools = true, optional = true }

[settings]
sops.rops = false

[tools]
node = "24"
"npm:markdownlint-cli2" = "0.22"
"npm:markdownlint-sentences-per-line" = "0.1"
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"
opentofu = "1.11"
"pipx:ansible-core" = "2.20"
sops = "3.12"
lefthook = "2.1"
tflint = "0.61"
trivy = "0.69"
age = "1.3"
gitleaks = "8.30"

[hooks.enter]
shell = "bash"
script = "lefthook install"

[tasks.lint]
description = "Run all linters"
depends = ["lint:markdown", "lint:terraform"]

[tasks."lint:markdown"]
description = "Lint markdown files"
run = "markdownlint-cli2 '**/*.md'"

[tasks."lint:terraform"]
description = "Lint and validate all Terraform configs"
depends = ["lint:terraform:fmt", "lint:terraform:routeros", "lint:terraform:github", "lint:terraform:trivy"]

[tasks."lint:terraform:fmt"]
description = "Check Terraform formatting (all modules)"
run = "tofu fmt -check -recursive terraform/"

# --- routeros module ---

[tasks."lint:terraform:routeros"]
description = "Validate and lint terraform/routeros"
depends = ["lint:terraform:routeros:validate", "lint:terraform:routeros:tflint"]

[tasks."lint:terraform:routeros:init"]
description = "Initialize routeros providers"
dir = "terraform/routeros"
run = "tofu init"

[tasks."lint:terraform:routeros:validate"]
description = "Validate routeros configuration"
dir = "terraform/routeros"
depends = ["lint:terraform:routeros:init"]
run = "tofu validate"

[tasks."lint:terraform:routeros:tflint:init"]
description = "Initialize TFLint for routeros"
dir = "terraform/routeros"
run = "tflint --init"

[tasks."lint:terraform:routeros:tflint"]
description = "Run TFLint on routeros"
dir = "terraform/routeros"
depends = ["lint:terraform:routeros:tflint:init"]
run = "tflint --recursive"

# --- github module ---

[tasks."lint:terraform:github"]
description = "Validate and lint terraform/github"
depends = ["lint:terraform:github:validate", "lint:terraform:github:tflint"]

[tasks."lint:terraform:github:init"]
description = "Initialize github providers"
dir = "terraform/github"
run = "tofu init"

[tasks."lint:terraform:github:validate"]
description = "Validate github configuration"
dir = "terraform/github"
depends = ["lint:terraform:github:init"]
run = "tofu validate"

[tasks."lint:terraform:github:tflint:init"]
description = "Initialize TFLint for github"
dir = "terraform/github"
run = "tflint --init"

[tasks."lint:terraform:github:tflint"]
description = "Run TFLint on github"
dir = "terraform/github"
depends = ["lint:terraform:github:tflint:init"]
run = "tflint --recursive"

# --- shared ---

[tasks."lint:terraform:trivy"]
description = "Run Trivy security scan on all Terraform"
run = "trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile terraform/github/.trivyignore terraform/"
