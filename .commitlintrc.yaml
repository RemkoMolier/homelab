# https://commitlint.js.org/
# Install: npx commitlint (config only — install deferred)

extends:
  - "@commitlint/config-conventional"

rules:
  # Enforce imperative mood is not machine-checkable, but max lengths are
  header-max-length: [2, always, 72]
  body-max-line-length: [1, always, 100]

  # Starter scopes — expand as infrastructure components are added
  scope-enum:
    - 2
    - always
    - - docs
      - infra
      - config
      - network
      - storage

  # Scopes are optional
  scope-empty: [0, never]
