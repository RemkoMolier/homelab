name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install_args: "node npm:markdownlint-cli2 npm:markdownlint-sentences-per-line"
      - run: mise run lint:markdown

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_state_passphrase: "ci-dummy-passphrase-not-used"
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install_args: "opentofu tflint trivy"

      - name: Run Terraform lint task
        run: mise run lint:terraform
