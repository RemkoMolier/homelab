version: 0.1
cli:
  version: 1.18.1
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.6.26
    - checkov@3.1.51
    - git-diff-check
    - hadolint@2.12.1-beta
    - markdownlint@0.38.0
    - prettier@3.1.1
    - renovate@37.122.0
    - taplo@0.8.1
    - terrascan@1.18.11:
        commands:
          - lint
    - trivy@0.48.2
    - trufflehog@3.63.7
    - yamllint@1.33.0
  ignore:
    - linters:
        - markdownlint
      paths:
        - CHANGELOG.md
        - containers/*/CHANGELOG.md
runtimes:
  enabled:
    - node@18.12.1
    - python@3.10.8
actions:
  enabled:
    - commitlint
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
